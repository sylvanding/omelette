repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: no-commit-to-branch
        args: ["--branch", "main"]
        stages: [pre-commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: local
    hooks:
      - id: frontend-eslint
        name: ESLint frontend
        entry: bash -c 'cd frontend && npx eslint --max-warnings 0 --cache --cache-location .eslintcache "${@#frontend/}"' --
        language: system
        types: [file]
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: true
        require_serial: true
      - id: frontend-tsc
        name: TypeScript check
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        types: [file]
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
        require_serial: true

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - test
          - chore
          - ci
          - perf
          - build
          - revert
